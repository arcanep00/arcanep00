name: Update System Dashboard

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Generate dashboard.svg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: arcanep00
        run: python scripts/generate_dashboard.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Update system dashboard"
          file_pattern: dashboard.svg
